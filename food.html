<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Indian Food Menu</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .card img {
            height: 220px;
            object-fit: cover;
        }
        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .header {
            background: linear-gradient(to right, #ff512f, #dd2476);
            color: white;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <!-- Header -->
    <div class="header text-center mb-4">
        <h2>🇮🇳 Indian Food Menu</h2>
        <p>Explore Delicious Indian Recipes</p>
    </div>

    <!-- Search Bar -->
    <div class="row mb-4">
        <div class="col-md-6 mx-auto">
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control" placeholder="Search Indian food...">
                <button class="btn btn-danger" onclick="searchMeals()">Search</button>
            </div>
        </div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="spinner-border text-danger"></div>
    </div>

    <!-- Meal Container -->
    <div class="row" id="mealContainer"></div>

</div>

<script>

const BASE_URL = "https://www.themealdb.com/api/json/v1/1/";

window.onload = function () {
    loadIndianMeals();
};

function loadIndianMeals() {
    document.getElementById("loader").style.display = "block";

    fetch(BASE_URL + "filter.php?a=Indian")
        .then(response => response.json())
        .then(data => {
            document.getElementById("loader").style.display = "none";
            displayMeals(data.meals);
        })
        .catch(error => {
            document.getElementById("loader").style.display = "none";
            console.error("Error:", error);
        });
}

function displayMeals(meals) {
    const container = document.getElementById("mealContainer");
    container.innerHTML = "";

    meals.forEach(meal => {
        const card = `
            <div class="col-md-4 mb-4">
                <div class="card shadow-lg h-100">
                    <img src="${meal.strMealThumb}" class="card-img-top" alt="Meal Image">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">${meal.strMeal}</h5>
                        <button class="btn btn-outline-danger mt-auto"
                                onclick="getMealDetails(${meal.idMeal})">
                            View Details
                        </button>
                    </div>
                </div>
            </div>
        `;
        container.innerHTML += card;
    });
}

function getMealDetails(id) {
    document.getElementById("loader").style.display = "block";

    fetch(BASE_URL + "lookup.php?i=" + id)
        .then(response => response.json())
        .then(data => {
            document.getElementById("loader").style.display = "none";
            showModal(data.meals[0]);
        });
}

function searchMeals() {
    const value = document.getElementById("searchInput").value;

    if (value === "") {
        loadIndianMeals();
        return;
    }

    document.getElementById("loader").style.display = "block";

    fetch(BASE_URL + "search.php?s=" + value)
        .then(response => response.json())
        .then(data => {
            document.getElementById("loader").style.display = "none";

            if (!data.meals) {
                document.getElementById("mealContainer").innerHTML =
                    "<h5 class='text-center text-danger'>No results found</h5>";
                return;
            }

            const indianMeals = data.meals.filter(meal => meal.strArea === "Indian");
            displayMeals(indianMeals);
        });
}

function showModal(meal) {
    const modalHtml = `
        <div class="modal fade" id="mealModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header bg-danger text-white">
                        <h5 class="modal-title">${meal.strMeal}</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <img src="${meal.strMealThumb}" class="img-fluid mb-3">
                        <p><strong>Category:</strong> ${meal.strCategory}</p>
                        <p><strong>Area:</strong> ${meal.strArea}</p>
                        <p>${meal.strInstructions.substring(0, 500)}...</p>
                        <a href="${meal.strYoutube}" target="_blank" class="btn btn-danger">
                            Watch Recipe
                        </a>
                    </div>
                </div>
            </div>
        </div>
    `;

    document.body.insertAdjacentHTML("beforeend", modalHtml);
    const modal = new bootstrap.Modal(document.getElementById("mealModal"));
    modal.show();

    document.getElementById("mealModal").addEventListener("hidden.bs.modal", function () {
        document.getElementById("mealModal").remove();
    });
}

</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
